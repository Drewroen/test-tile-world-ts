<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>tworld-engine demo</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <h1>tworld-engine demo</h1>
      <p class="subtitle">
        A TypeScript port of the Tile World (Chip's Challenge) game logic —
        playing <code>intro.dat</code> live in the browser.
      </p>

      <div class="toolbar">
        <label>
          Level:
          <select id="level-select"></select>
        </label>
        <label>
          Ruleset:
          <select id="ruleset-select">
            <option value="lynx" selected>Lynx</option>
            <option value="ms">MS</option>
          </select>
        </label>
        <label>
          View:
          <select id="viewport-select">
            <option value="full">Full map</option>
            <option value="traditional" selected>Traditional (9x9)</option>
          </select>
        </label>
        <button id="restart-btn">Restart</button>
      </div>

      <div class="game-area">
        <canvas id="board" width="512" height="512"></canvas>
        <div class="hud">
          <div><strong id="level-name">—</strong></div>
          <div>Chips needed: <span id="chips-needed">0</span></div>
          <div>Time: <span id="time-left">—</span></div>
          <div>Keys: <span id="keys">—</span></div>
          <div>Boots: <span id="boots">—</span></div>
          <div id="status" class="status"></div>
          <p class="hint">
            Use arrow keys to move (click the board first), or on mobile tap
            the top/left/right/bottom of the board.
          </p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
